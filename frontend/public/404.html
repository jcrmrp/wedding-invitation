<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fafafa;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 6rem; margin: 0; color: #d4af37; }
        h2 { font-size: 2rem; margin-bottom: 1rem; }
        p { font-size: 1.1rem; margin-bottom: 2rem; max-width: 500px; line-height: 1.6; }
        a {
            text-decoration: none;
            color: #fff;
            background-color: #333;
            padding: 12px 24px;
            border-radius: 2px;
            transition: background-color 0.3s ease;
        }
        a:hover { background-color: #555; }
    </style>
</head>
<body>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! It looks like this page wandered away from the wedding celebration. Please head back to the main invitation to find your way.</p>
    <a href="/wedding-invitation/">Back to Invitation</a>
</body>
</html>
